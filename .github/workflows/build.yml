name: "Build & Release"

on:
  push:
    tags:
      - 'v*'

env:
  INTG_NAME: vrroom
  PYTHON_VER: 3.11.12-0.3.0

jobs:
  build:
    name: Build aarch64 Release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in driver.json
        run: |
          jq --arg v "$VERSION" '.version = $v' driver.json > driver.json.tmp
          mv driver.json.tmp driver.json

      - name: Build aarch64 binary with PyInstaller
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-system-arm binfmt-support qemu-user-static
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker run --rm --name builder \
            --platform=aarch64 \
            --user=$(id -u):$(id -g) \
            -v ${GITHUB_WORKSPACE}:/workspace \
            docker.io/unfoldedcircle/r2-pyinstaller:${PYTHON_VER} \
            bash -c \
            "cd /workspace && \
              python -m pip install -r requirements.txt && \
              pyinstaller --clean --onedir --name intg-vrroom \
                --collect-all zeroconf \
                --paths src \
                --add-data 'driver.json:.' \
                src/driver.py"

      - name: Prepare artifact structure
        run: |
          mkdir -p artifacts/bin
          # Move PyInstaller output, rename main executable to 'driver'
          mv dist/intg-vrroom/* artifacts/bin/
          mv artifacts/bin/intg-vrroom artifacts/bin/driver
          # driver.json goes in the root of the archive
          cp driver.json artifacts/
          echo "ARTIFACT_NAME=uc-intg-vrroom-${{ env.VERSION }}-aarch64" >> $GITHUB_ENV

      - name: Create tar.gz archive
        run: |
          tar czvf ${{ env.ARTIFACT_NAME }}.tar.gz -C ${GITHUB_WORKSPACE}/artifacts .
          ls -lah ${{ env.ARTIFACT_NAME }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4

      - name: Flatten downloaded files
        run: |
          for D in */; do
            if [ -d "$D" ]; then mv "$D"* ./; fi
          done

      - name: Create SHA256 hash file
        run: |
          for f in *.tar.gz; do
            echo "sha256  $(sha256sum $f)" >> vrroom.hash
          done

      - name: Create release draft
        uses: ncipollo/release-action@v1
        with:
          artifacts: "*.tar.gz,vrroom.hash"
          draft: true
          generateReleaseNotes: true
          artifactErrorsFailBuild: true
          tag: v${{ needs.build.outputs.version }}
